  /v1/historic_rate/period:
    get:
      tags:
      - Mid-market Rates
      summary: Get historic rates for one base currency against one or more 
        counter currencies over a period of time.
      description: This endpoint returns a daily historic rate for a single base
        currency and one or more counter currencies over a period of 
        time.<br/><br/><a 
        href="https://xecdapi.xe.com/v1/historic_rate/period.csv/?from=USD&to=CAD&start_timestamp=2017-09-01&end_timestamp=2017-11-30&per_page=30">https://xecdapi.xe.com/v1/historic_rate/period.csv/?from=USD&to=CAD&start_timestamp=2017-09-01&end_timestamp=2017-11-30&per_page=30</a><br/>
      parameters:
      - name: from
        in: query
        description: OPTIONAL – Currency you want to convert from ISO code. Note
          if this parameter is omitted, default is USD.<br/>
        schema:
          type: string
      - name: to
        in: query
        description: 'Comma separated list of to currencies based on ISO 4217 codes.<br/>This
          will limit the data returned to only those currencies you are interested
          in.<br/> Note: Obsolete currencies are replaced by their precursor or successor
          currency.<br/>'
        required: true
        schema:
          type: string
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1.00 is 
          assumed.<br/>
        schema:
          type: number
      - name: start_timestamp
        in: query
        description: OPTIONAL - ISO 8601 timestamp in the format 
          yyyy-mm-ddThh:mm giving the UTC date and time of the start of the 
          period for which you would like rates returned.<br/><br/>If you’re 
          querying using a daily interval, the time value will be ignored & the 
          endpoint will return rates at your preferred daily lock-in time 
          starting on the date specified in your request. If your account does 
          not have a preferred daily lock-in time then rates will return as of 
          00:00 UTC.<br/>If you’re querying using a faster rate interval than 
          daily rate interval, your endpoint will return rates starting at 00:00
          UTC if no time portion is specified.<br/>
        schema:
          type: string
      - name: end_timestamp
        in: query
        description: OPTIONAL – ISO 8601 timestamp in the format 
          yyyy-mm-ddThh:mm giving the UTC date and time of the end of the period
          for which you would like rates returned. If a time in the future is 
          specified, the current time will be used. If no end_time is specified,
          the time specified in the “start_timestamp" parameter will also be 
          used for the "end_timestamp".<br/>If your query is using a daily rate 
          interval, your endpoint will return rates at your preferred daily 
          lock-in time ending on the date specified in your request. If your 
          account does not have a preferred daily lock-in time then rates will 
          return as of 00:00 UTC.<br/>If your query is using a faster rate 
          interval than daily, your endpoint will return daily rates at your 
          specified lock-in time or 00:00 UTC by default, unless you specify a 
          time parameter in your rate request.
        schema:
          type: string
      - name: interval
        in: query
        description: OPTIONAL – Using one of the interval values below in your 
          call request will return rates for that specific 
          interval.<br/><br/>"daily" - Returns one rate for the days specified 
          in your time period<br/>"hourly" - Returns rates for every hour in the
          time period you specify<br/>"15minutes" - Returns rates for each 15 
          minute interval in the time period you specify, available for 7 days 
          from current date<br/>”minutely” - Returns minutely rates for the time
          period, available for 7 days from current date<br/><br/>If omitted, 
          "daily" is used. This parameter is only used if both the 
          "start_timestamp" and "end_timestamp" parameters have been specified.
        schema:
          type: string
      - name: page
        in: query
        description: 'OPTIONAL – You can specify the page number you want to request.<br/>Note:
          that page numbering is 1-based (the first page being page 1).<br/>Omitting
          this parameter will return the first page.<br/>'
        schema:
          type: number
      - name: per_page
        in: query
        description: OPTIONAL – You can specify the number of days per page. The
          default is 30 days of rates per page with a maximum of 500 days of 
          rates per page.<br/>
        schema:
          type: number
      - name: obsolete
        in: query
        description: OPTIONAL – If ‘true’ then endpoint will display rates for 
          currencies that are obsolete. If ‘false’ then obsolete currencies are 
          replaced by their successor currency.
        schema:
          type: boolean
      - name: inverse
        in: query
        description: OPTIONAL – If ‘true’ then endpoint will display the inverse
          of the converted value. If ‘false‘ then it will not be displayed.
        schema:
          type: boolean
      - name: decimal_places
        in: query
        description: OPTIONAL – This parameter can be used to specify the number
          of decimal places included in the output. Example 1 USD to EUR = 
          0.874852 with decimal_places=3, the output returned will be EUR = 
          0.875
        schema:
          type: number
      - name: margin
        in: query
        description: 'OPTIONAL – This parameter can be used to add a margin (-/+)  to
          XE''s mid-market rate. Example: add margin=2.05 parameter to the endpoint
          and the API will return our mid-market rates plus the margin of 2.05 percent.'
        schema:
          type: number
      - name: crypto
        in: query
        description: |-
          OPTIONAL – If 'true' then this endpoint will return data for the following crypto currencies: ADA, ARB, AVAX, BCH, BNB, BTC, DAI, DOGE, DOT, ETH, EURC, LINK, LTC, LUNA, POL, SOL, TRX, UNI, USDC, USDP, USDT, XLM and XRP.

          <i>Note: Historical crypto data varies by currency. Most start from May 2022 onward.</i>
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricRatePeriodResponse'
        '400':
          description: Bad Request
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1
                message: Bad credentials
                documentation_url: https://xecdapi.xe.com/docs/v1/
            text/plain:
              schema:
                type: string
              example: 'Endpoint not authorized. Feature missing: HISTORIC_RATES'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
