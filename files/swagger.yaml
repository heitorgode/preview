        schema:
          type: string
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1 is 
          assumed.<br/>
        schema:
          type: number
      - name: year
        in: query
        description: OPTIONAL – This parameter specifies the year to calculate 
          average monthly rates.<br/>
        schema:
          type: number
      - name: month
        in: query
        description: OPTIONAL – This parameter specifies the month in the given 
          year to return average monthly rates. This is a numeric value from 1 
          to 12 where 1 is for January and 12 is for December. If no month is 
          provided, then all months for the given year are returned.<br/>
