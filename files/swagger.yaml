  /v1/stats:
    get:
      tags:
      - Mid-market Rates
      summary: Gets an average rate over the specified time period, as well 
        various additional statistics such as the standard deviation and 
        volatility.
      description: 'The stats endpoint returns average rates for a single base currency
        and one or more counter currencies over the time period you specify in your
        API query. Note that, unlike the monthly_average endpoint, you specify exact
        start and end dates, which provides a heightened level of control. This can
        be quite useful if you want statistics for bi-monthly averages or any other
        intervals of time. <br/><br/> This endpoint also provides several other statistics:
        the highest and lowest rate over the period (and their respective timestamps),
        the average rate, the standard deviation, volatility, and the number of data
        points over this period. <br/><br/> To provide some background to how we obtain
        our statistics, volatility is measured by applying the standard deviation
        of the logarithmic daily returns, expressed in a percentage score. We calculate
        daily returns using the values of two consecutive days and measure the gain
        or loss of a currency pair (<b>for live rate frequency packages this comparison
        is done at 00:00 UTC; daily rate frequency packages will compute stats based
        on the rate lock-in time specified on the account</b>). Then, we apply a logarithm
        to the ratio between those two values (Ex: ln (valueDay2 / valueDay1) is the
        logarithmic return between day2 and day1). As for the standard deviation,
        we apply it to the daily logarithmic returns we calculated during the given
        time period. When applicable, values are expressed as a percentage so they
        are already multiplied by 100.'
      parameters:
      - name: from
        in: query
        description: OPTIONAL – Currency you want to convert from ISO code. Note
          if this parameter is omitted, default is USD.<br/>
        schema:
          type: string
      - name: to
        in: query
        description: Comma separated list of to currencies based on ISO 4217 
          codes. This will limit the data returned to only those currencies that
          are specified.<br/>
        required: true
        schema:
          type: string
      - name: start_date
        in: query
        description: OPTIONAL – ISO 8601 timestamp in the format yyyy-mm-dd 
          giving the UTC date of the start of the period for which you would 
          like to compute the volatility from. Note if this parameter is 
          omitted, the start date will default to today.<br/>
        schema:
          type: string
      - name: end_date
        in: query
        description: OPTIONAL – ISO 8601 timestamp in the format yyyy-mm-dd 
          giving the UTC date of the end of the period for which you would like 
          to compute the volatility to. Note if this parameter is omitted, the 
          end date will default to today.<br/>
        schema:
          type: string
      - name: obsolete
        in: query
        description: OPTIONAL – If ‘true’ then endpoint will display rates for 
          currencies that are obsolete. If ‘false’ then obsolete currencies are 
          replaced by their successor currency.
        schema:
          type: boolean
      - name: decimal_places
        in: query
        description: OPTIONAL – This parameter can be used to specify the number
          of decimal places included in the output. Example 1 USD to EUR = 
          0.874852 with decimal_places=3, the output returned will be EUR = 
          0.875
        schema:
          type: number
      - name: daysInPeriod
        in: query
        description: OPTIONAL – This parameter can be used to specify the number
          of days in the period that we are considering.
        schema:
          type: number
      - name: crypto
        in: query
        description: 'OPTIONAL – If ''true'' then this endpoint will return data for
          the following crypto currencies: ADA, ARB, AVAX, BCH, BNB, BTC, DAI, DOGE,
          DOT, ETH, EURC, LINK, LTC, LUNA, POL, SOL, TRX, UNI, USDC, USDP, USDT, XLM
          and XRP.'
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '400':
          description: Bad Request
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
