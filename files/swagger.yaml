      - name: to
        in: query
        description: Comma separated list of to currencies ISO 4217 codes.  This
          will limit the data returned to only those currencies you are 
          interested in. Use an asterisk * to convert all currencies.
        required: true
        schema:
          type: string
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1 is 
          assumed.<br/>
        required: false
        schema:
          type: number
          default: 1
      - name: date
        in: query
        description: OPTIONAL – YYYY-MM-DD format - request rates for a 
          particular past date.  Rates are often not posted on weekends and 
          holidays.  bid and ask are not available yet for past rates
        required: false
        schema:
          type: string
      - name: inverse
        in: query
        description: 'OPTIONAL – If ‘true’, the endpoint will include inverse rates.
          An inverse rate is a quote for which the base currency and counter currency
          are switched. An inverse is calculated by dividing one by the exchange rate.
          Example: If the exchange rate for 1 USD to EUR = 0.874852, then the inverse
          rate would be 1/0.874852 = 1.14305, meaning that US$1.14305 would buy 1
          euro.'
        required: false
        schema:
          type: boolean
          default: false
      - name: decimal_places
        in: query
        description: 'OPTIONAL – This parameter can be used to specify the number
          of decimal places included in the output. Example: if 1 USD to EUR = 0.874852,
          adding decimal_places=3 to the query will result in the endpoint returning
          EUR = 0.875'
        required: false
        schema:
          type: number
          default: 20
      - name: margin
        in: query
        description: 'OPTIONAL – This parameter can be used to add a margin (+/-)
          to the exchange rate. Example: adding margin=2.05 to the query will result
          in the endpoint returning the current exchange rates with a +2.05% margin'
        required: false
        schema:
          type: number
          default: 0
      - name: fields
        in: query
        description: Comma separated list of fields.  One or more of "mid", 
          "bid" or "ask".  Bid and ask are only available when requesting the 
          current bank rate.
        required: false
        schema:
          type: string
          default: mid
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CentralBankExchangeRateResponse'
        '304':
          description: Not Modified
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
