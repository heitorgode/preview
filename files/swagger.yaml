      - name: fields
        in: query
        description: OPTIONAL - Comma separated list of fields. One or more of 
          "mid", "bid" or "ask".
        required: false
        schema:
          type: string
          default: mid
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
