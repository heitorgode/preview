  /v1/historic_rate:
    get:
      tags:
      - Mid-market Rates
      summary: Get historic rates for one base currency against one or more 
        counter currencies.
      description: The Currency Data API provides you with access to daily 
        historical rates back to 1998. When retrieving historical rates through 
        our Currency Data API, you would specify your requested currencies along
        with the date and/or date range and time (hh:mm). Minutely and 15 minute
        rates are available for the past 7 days. Outside of 7 days you have 
        access to rates on the hour. Historical rates are available with all API
        packages. The time parameter (hh:mm) is applicable only for packages 
        with access to rate updates faster than daily.<br/>The endpoint returns 
        the historic rate for a single base currency and one or more counter 
        currencies.<br/><br/><a 
        href="https://xecdapi.xe.com/v1/historic_rate.csv/?from=USD&date=2011-03-05&to=CAD,EUR">https://xecdapi.xe.com/v1/historic_rate.csv/?from=USD&date=2011-03-05&to=CAD,EUR</a><br/>
      parameters:
      - name: from
        in: query
        description: OPTIONAL – Currency you want to convert from ISO 
          code.<br/>Note if this parameter is omitted, default is USD.<br/>
        schema:
          type: string
      - name: to
        in: query
        description: 'Comma separated list of to currencies ISO 4217 codes.<br/>This
          will limit the data returned to only those currencies you are interested
          in. Use an asterisk * to specify all currencies.<br/> Note: Obsolete currencies
          are replaced by their precursor or successor currency.<br/>'
        required: true
        schema:
          type: string
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1.00 is 
          assumed.<br/>
        schema:
          type: number
      - name: date
        in: query
        description: OPTIONAL - UTC date should be in the form of YYYY-MM-DD, 
          back to 1995-11-16.<br/><br/>If your account is registered to receive 
          daily rates only, the default time value used is 00:00 UTC, or your 
          daily lock-in time if one is set.<br/><br/>Otherwise the endpoint will
          return the latest rates for your chosen date.
        schema:
          type: string
      - name: time
        in: query
        description: OPTIONAL – *Time parameter is only applicable to packages 
