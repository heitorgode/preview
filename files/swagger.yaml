  /v1/alternative_source_rate:
    get:
      tags:
      - Alternative Source Exchange Rates
      summary: Foreign exchange rates posted by private banks, exchange markets,
        government entities & more.
      description: |
        <p>
        In the example below, the endpoint will display all exchange ratesvreported by Maybank (the asterisk * represents ALL currencies).
        </p>
        <p>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="https://xecdapi.xe.com/v1/alternative_source_rate?source=maybank&iso=*">https://xecdapi.xe.com/v1/alternative_source_rate?source=maybank&iso=*</a>
        </p>
        <p>
        <i>Note on Alternative Source Rate Coverage: Some sources may experience temporary
        data gaps due to source website changes or access restrictions. For these
        sources, we continue to provide historical data and are working to restore
        full coverage.</i>
        </p>
      parameters:
      - name: source
        in: query
        description: |
          REQUIRED – Use the following source codes to represent the specific source you are querying for. The time(s) specified below highlights the time rates are published by each respective source within the API service.<br/>
          | Source | Country | Name | Posts | Available at (UTC) | Effective for | Bid/Ask
          |:---: |:---: |:---: |:---: |:---: |:---: |:---: |
          | anz | Australia | ANZ Investment Bank | Daily | 16:00 | Same day | ✓
          | anz-fj | Fiji | ANZ Investment Bank (Fiji Markets) | Daily | 23:00 | Same day | ✓
          | belarus_republic | Belarus | Republic of Belarus Official Website | Daily | 08:00 | Same day | 
          | bmf | Germany | Federal Ministry of Finance | Monthly | Monthly | Previous Month | 
          | BNA | Argentina | Bank of the Argentine Nation (Banco de la Nación Argentina) | Daily | 17:00 | Same day | ✓
          | brazil_ptax | Brazil | Central Bank of Brazil PTAX | Daily | 18:00 | Same day | 
          | citibank-vn | Vietnam | Citibank Vietnam Markets | Daily | 11:00 | Same day | ✓
          | commerzbank | Germany | Commerzbank | Daily | 01:00 | Same day | ✓
          | cyprus_customs | Cyprus | Cyprus Customs & Excise Department | Monthly | End of Month | Same Month | 
          | egypt | Egypt | Central Bank of Egypt (Market Rate) | Daily | 14:00 | Same day | ✓
          | HKAB | Hong Kong | Hong Kong Association of Banks | Daily | 01:00 | Same day | ✓
          | indonesia_treasury | Indonesia | Indonesia Treasury (Badan Kebijakan Fiskal) | Daily | 01:00 | Same day | 
          | ireland_revenue | Ireland | Revenue - Irish Tax and Customs | Monthly | Monthly | Same Month | 
          | maybank | Malaysia | Maybank | Daily | 06:00 | Same day | ✓
          | mitsubishi_ufg | Japan | Mitsubishi UFJ Financial Group (Mitsubishi UFJ Financial Group) | Daily | 03:00 | Same day | ✓
          | NatWest | United Kingdom of Great Britain and Northern Ireland | National Westminster Bank | Daily | 09:00 | Same day | ✓
          | nzfma | New Zealand | New Zealand Financial Markets Association | Daily | 03:00 | Same day | 
          | peru-sbs | Peru | Superintendency of Banking, Insurance and Private Pension Fund Administrators (Superintendencia de Banca, Seguros y AFP (República del Perú)) | Daily | 19:00 | Same day | ✓
          | SFC | Colombia | Financial Superintendence of Colombia | Daily | 22:00 | Same day | 
          | taiwan_customs | Taiwan | Customs Administration, Ministry of Finance (Taiwan Customs Administration) | Monthly | On days 1, 11, 21 of each month | Same month | ✓
          | uganda_ra | Uganda | Uganda Revenue Authority | Daily | 14:00 | Same day | 
          | vietcom | Vietcombank | Joint Stock Commercial Bank for Foreign Trade of Vietnam | Daily | 17:00 | Same day | ✓
        required: true
        schema:
          type: string
      - name: iso
        in: query
        description: OPTIONAL - Comma separated list of to currencies ISO 4217 
          codes. This will limit the data returned to only those currencies you 
          are interested in.
        required: false
        schema:
          type: string
          default: '*'
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1 is 
          assumed.<br/>
        required: false
        schema:
          type: number
          default: 1
      - name: date
        in: query
        description: OPTIONAL – YYYY-MM-DD format - request latest rates on, or 
