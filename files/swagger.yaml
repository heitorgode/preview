openapi: 3.0.1
info:
  title: Xe Currency Data API
  description: Xe Currency Data - Integrate your application with our globally 
    trusted currency data.<br/><br/> Get your free API credentials for 7 days <a
    href="https://xecd-account-api.xe.com/v2/newuser?type=freetrial/">here</a>
  version: '1.0'
servers:
- url: https://xecdapi.xe.com
security:
- basicAuth: []
paths:
  /v1/account_info:
    get:
      tags:
      - Account Information
      summary: This endpoint will return basic information for a specific 
        account.
      description: Requires Headers "username" and "password"<br/>
      responses:
        '200':
          description: Success
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/currencies:
    get:
      tags:
      - Currency Information
      summary: Access a list of all available currencies.
      description: This endpoint will return a list of all currencies, active 
        and obsolete, available via the XE Currency Data Feed API.<br/><br/>If 
        the obsolete optional parameter is included, then the list will contain 
        both active and obsolete currencies.
      parameters:
      - name: iso
        in: query
        description: 'OPTIONAL – Comma separated list of ISO 4217 codes. This will
          limit the data returned to only those currencies that are specified. If
          this parameter is omitted, this endpoint will return results for all currencies.<br/><br/>
          It is a prefix match; you can provide it with one, two, or three characters
          and it will return a list of all the currencies with ISO 4217 codes that
          match.<br/><br/> A list of acceptable ISO 4217 currency codes can be found
          here: http://www.xe.com/iso4217.php'
        schema:
          type: string
      - name: obsolete
        in: query
        description: OPTIONAL – If 'true' then endpoint will display currencies 
          that are obsolete but for which historical data is available
        schema:
          type: boolean
      - name: language
        in: query
        description: 'OPTIONAL – Default is en. Specified as an RFC-1766-compliant
          language tag.<br/><br/>Languages available: ar, de, en, es, fr, it, ja,
          pt, sv, zh-CN, zh-HK.'
        schema:
          type: string
      - name: additionalInfo
        in: query
        description: OPTIONAL - If 'symbol' then returns 'currency_symbol' and 
          'currency_symbol_on_right' in response
        schema:
          type: string
      - name: crypto
        in: query
        description: 'OPTIONAL – If ''true'' then this endpoint will return data for
          the following crypto currencies: ADA, ARB, AVAX, BCH, BNB, BTC, DAI, DOGE,
          DOT, ETH, EURC, LINK, LTC, LUNA, POL, SOL, TRX, UNI, USDC, USDP, USDT, XLM
          and XRP.'
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyInfoResponse'
        '304':
          description: Not Modified
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bid_ask:
    get:
      tags:
      - Bid & Ask Rates (Beta)
      summary: Convert from one base currency to one or multiple counter 
        currencies.
      description: |-
        <p>
        <b>This feature is in beta.</b> Access and functionality may evolve. If you’d like to participate, please sign up for our free trial.
        </p>
        <p>
        This endpoint provides <b>indicative spot bid-ask pricing</b>, updated <b>every 10 seconds</b> and sourced 
        from aggregated institutional liquidity. Data is <b>informational only</b> and may contain inaccuracies 
        during the beta phase. 
        </p>
        <h2>Endpoint Example</h2>
        <p>
        <a href="https://xecdapi.xe.com//v1/bid_ask?from=GBP&to=EUR,USD">https://xecdapi.xe.com/v1/bid_ask?from=GBP&to=EUR,USD</a> 
        </p>
        <h2>Supported Currencies</h2>
        <p>
        The Bid &amp; Ask (Beta) endpoint supports the following currencies: <b>AUD, BRL, CAD, CHF, CNH, DKK, EUR, GBP, JPY, NOK, NZD, PLN, SEK, USD</b>
        </p>
        <p>
        Any pair can be requested in either direction (as <b>from</b> or <b>to</b>), with the following exceptions involving <b>CNH</b> (offshore Chinese yuan):
        </p>
        <ul>
          <li>CNH is not available with <b>BRL</b>, <b>DKK</b>, or <b>PLN</b> in either direction.</li>
          <li>CNH is supported only as the target currency for <b>NOK</b> and <b>SEK</b>:
          <b>from=NOK&amp;to=CNH</b> and <b>from=SEK&amp;to=CNH</b> are available,
          but <b>from=CNH&amp;to=NOK</b> and <b>from=CNH&amp;to=SEK</b> are not.</li>
        </ul>
        <p>
        The rates provided are indicative spot bid-ask prices derived from aggregated institutional 
        liquidity sources and refreshed every 10 seconds. As this feature is in beta, behaviour and 
        coverage may change, and occasional inaccuracies or inconsistencies may occur. These rates are 
        intended for informational use only and should not be relied upon for financial reporting or 
        decision-making.
        </p>
      parameters:
      - name: from
        in: query
        description: Currency to convert from (ISO code).
        required: true
        schema:
          type: string
      - name: to
        in: query
        description: Comma separated list of currencies to convert to (ISO
          codes).
        required: true
        schema:
          type: string
      - name: decimal_places
        in: query
        description: OPTIONAL – This parameter can be used to specify the number
          of decimal places included in the output. Example 1 USD to EUR =
          0.874852 with decimal_places=3, the output returned will be EUR =
          0.875
        schema:
          type: number
      responses:
        '200':
          description: Successful retrieval of bid/ask rates
          headers:
            X-Request-Id:
              description: Unique request identifier
              schema:
                type: string
            X-RateLimit-Limit:
              description: Total requests allowed in current window
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in current window
              schema:
                type: integer
            X-RateLimit-Reset:
              description: Unix timestamp when rate limit resets
              schema:
                type: integer
            X-RateRequest-Limit:
              description: Total rate requests allowed
              schema:
                type: integer
            X-RateRequest-Remaining:
              description: Remaining rate requests
              schema:
                type: integer
            X-RateRequest-Reset:
              description: Unix timestamp when rate request quota resets
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    type: string
                  privacy:
                    type: string
                  rates:
                    type: array
                    items:
                      $ref: '#/components/schemas/BidAskRate'
        '400':
          description: Invalid request parameters or BidAskException. May 
            include field-specific validation errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Error code (e.g., 17 for validation errors)
                  message:
                    type: string
                    description: Error message describing what went wrong
                  documentation_url:
                    type: string
                    description: Link to API documentation
                  fieldErrors:
                    type: object
                    additionalProperties:
                      type: string
                    description: Map of field names to validation error messages
                      (present only for validation errors)
              example:
                code: 17
                message: Invalid request parameters
                documentation_url: https://xecdapi.xe.com/docs/v1/
                fieldErrors:
                  to: At least one valid currency is required
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Error code (e.g., 1 for authentication errors)
                  message:
                    type: string
                    description: Error message describing what went wrong
                  documentation_url:
                    type: string
                    description: Link to API documentation
              example:
                code: 1
                message: Bad credentials
                documentation_url: https://xecdapi.xe.com/docs/v1/
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Error code
                  message:
                    type: string
                    description: Error message describing the issue
                  documentation_url:
                    type: string
                    description: Link to API documentation
              example:
                code: 0
                message: No static resource direct/v1/bid-ask
                documentation_url: https://xecdapi.xe.com/docs/v1/
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidAskErrorResponse'
  /v1/convert_from:
    get:
      tags:
      - Mid-market Rates
      summary: Convert from one base currency to one or multiple counter 
        currencies.
      description: In the example below, the Convert FROM API query endpoint is 
        to convert from GBP to all available currencies (the asterisk * 
        represents ALL currencies).<br/><a 
        href="https://xecdapi.xe.com/v1/convert_from.csv/?from=GBP&to=*&amount=1">https://xecdapi.xe.com/v1/convert_from.csv/?from=GBP&to=*&amount=1</a>
      parameters:
      - name: from
        in: query
        description: OPTIONAL – Currency you want to convert from ISO code. Note
          if this parameter is omitted, default is USD.<br/>
        schema:
          type: string
      - name: to
        in: query
        description: 'Comma separated list of to currencies ISO 4217 codes.  This
          will limit the data returned to only those currencies you are interested
          in. Use an asterisk * to convert all currencies.<br/> Note: Obsolete currencies
          are replaced by their successor currency.<br/>'
        required: true
        schema:
          type: string
      - name: amount
        in: query
        description: OPTIONAL – This parameter can be used to specify the amount
          you want to convert, if an amount is not specified then 1 is 
          assumed.<br/>
        schema:
          type: number
      - name: obsolete
        in: query
        description: OPTIONAL – If ‘true’ then endpoint will display rates for 
          currencies that are obsolete. If ‘false’ then obsolete currencies are 
          replaced by their successor currency.
        schema:
          type: boolean
      - name: interval
        in: query
        description: OPTIONAL – Using one of the interval values below in your 
          call request will return rates for that specific 
          interval.<br/><br/>"daily" - Returns the latest daily rate at your 
          pre-chosen daily lock-in time<br/>"hourly" - Returns rates for the 
          most recent hour<br/>"15minutes" - Returns rates for the most recent 
          15 minute period<br/>"minutely" - Returns rates for the most recent 
          minute<br/><br/>If omitted, we’ll default to your fastest rate 
          frequency (i.e. live, 15-min, hourly, then daily) as per your 
          subscription plan.
        schema:
          type: string
      - name: inverse
        in: query
        description: 'OPTIONAL – If ‘true’ then endpoint will include inverse rates.
          An inverse rate is a quote for which the base currency and counter currency
          are switched. An inverse is calculated by dividing one by the exchange rate.
          Example: If the exchange rate for $1 USD to EUR = 0.874852, then the inverse
          rate would be 1/0.874852 = 1.14305, meaning that US$1.14305 would buy 1
          euro.'
        schema:
          type: boolean
      - name: decimal_places
        in: query
        description: OPTIONAL – This parameter can be used to specify the number
          of decimal places included in the output. Example 1 USD to EUR = 
          0.874852 with decimal_places=3, the output returned will be EUR = 
          0.875
        schema:
          type: number
      - name: margin
        in: query
        description: 'OPTIONAL – This parameter can be used to add a margin (-/+)  to
          XE''s mid-market rate. Example: add margin=2.05 parameter to the endpoint
          and the API will return our mid-market rates plus the margin of 2.05 percent.'
        schema:
          type: number
      - name: crypto
        in: query
        description: 'OPTIONAL – If ''true'' then this endpoint will return data for
          the following crypto currencies: ADA, ARB, AVAX, BCH, BNB, BTC, DAI, DOGE,
          DOT, ETH, EURC, LINK, LTC, LUNA, POL, SOL, TRX, UNI, USDC, USDP, USDT, XLM
          and XRP.'
        schema:
          type: boolean
      - name: skip_weekends
        in: query
        description: OPTIONAL - Applicable to queries with rate intervals faster
          than daily. If 'true' then requests during the weekend will respond 
          with the rate as of market close (Friday, 5pm America/New_York).
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertFromResponse'
        '304':
          description: Not Modified
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            ETag:
              schema:
                type: string
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            Last-Modified:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          headers:
            X-RateRequest-Remaining:
              schema:
                type: number
            X-RateLimit-Remaining:
              schema:
                type: number
            X-RateRequest-Reset:
              schema:
                type: number
            X-RateLimit-Reset:
              schema:
                type: number
            X-RateLimit-Limit:
              schema:
                type: number
            X-RateRequest-Limit:
              schema:
                type: number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
