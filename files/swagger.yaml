              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/monthly_average:
    get:
      tags:
      - Mid-market Rates
      summary: 'Get monthly average rates for a single base currency and one or more
        counter currency for the month/year you specify in your API query. '
      description: The monthly average endpoint returns monthly average rates 
        for a single base currency and one or more counter currency for the year
        you specify in your API query. The monthly average rate is calculated by
        taking the 00:00 UTC Daily rate for each day in the month/year you 
        specify in your query. Months are returned as a numeric value from 1 to 
        12 where 1 is for January and 12 is for December. If no month is 
        provided, then all months for the given year are returned.<br/>
      parameters:
      - name: from
        in: query
        description: OPTIONAL – Currency you want to convert from ISO code. Note
          if this parameter is omitted, default is USD.<br/>
        schema:
          type: string
      - name: to
        in: query
        description: Comma separated list of to currencies based on ISO 4217 
          codes. This will limit the data returned to only those currencies that
          are specified.<br/>
